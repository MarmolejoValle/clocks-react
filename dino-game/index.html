<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Rex Runner - Chrome Dino Game</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="waiting-message" style="
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background-color: rgba(0,0,0,0.7);
    color: white;
    padding: 10px 20px;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    border-radius: 10px;
    z-index: 1000;
">
    Esperando a otro jugador...
</div>
<div id="scoreboard" style="position:absolute; top:10px; right:10px; background:rgba(255,255,255,0.8); padding:10px; border-radius:8px; font-family:monospace;"></div>

    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="200"></canvas>
        <div class="game-over hidden">
            <h2>Game Over!</h2>
            <p>Puntuación: <span id="final-score">0</span></p>
           <!--<button id="restart-btn">Reiniciar</button>---> 
        </div>
        <div class="hud">
            <div class="score">HI <span id="high-score">00000</span> <span id="current-score">00000</span></div>
        </div>
    </div>
    
    <div class="instructions">
        <p>Presiona <strong>ESPACIO</strong> para saltar • <strong>↓</strong> para agacharse</p>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/dino.js"></script>
    <script src="js/obstacle.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
